<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main Page</title>
    <link rel="stylesheet" href="css/layout.css" />
    <style>
      .left-container {
        border: 1px solid red;
      }
      .middle-container {
        border: 1px solid blue;
      }
      .right-container {
        border: 1px solid green;
      }

      .body {
        position: fixed;
        inset: 0;
        z-index: -1;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .body img {
        width: 100%;
        height: 100%;
        object-fit: contain; /* prevents cropping */
        object-position: center; /* centers the image */
        display: block;
        background-repeat: no-repeat;
      }
    </style>
    <link rel="stylesheet" href="css/home.css" />
  </head>
  <body style="background-image: url(images/ragnarokbg.png)">
    <section id="homePage" class="page active">
      <!-- HOME CONTENT -->
      <div class="left-container">
        <div class="header">
          <!-- Bar -->
          <div class="vital-stats">
            <img src="images/acolyteBarfemale.png" class="bars-character" />

            <div class="level-box">
              <span class="lvl-label">BASE LVL.</span>
              <input type="text" class="lvl-value-input" value="99" />
            </div>

            <div class="bars-container">
              <div class="bar-row">
                <div class="bar-label">HP</div>
                <div class="bar-bg">
                  <div class="bar-fill hp-fill"></div>
                </div>
                <input
                  type="text"
                  class="bar-text-input"
                  value="4,250 / 5,000"
                  readonly
                />
              </div>

              <div class="bar-row">
                <div class="bar-label">SP</div>
                <div class="bar-bg">
                  <div class="bar-fill sp-fill"></div>
                </div>
                <input
                  type="text"
                  class="bar-text-input"
                  value="1,250 / 2,000"
                  readonly
                />
              </div>
            </div>
          </div>

          <!-- Regen -->
          <div class="regen-container">
            <div class="regen-row">
              <span class="regen-label"
                >Natural <span class="hp-text">HP</span> Regen:</span
              >
              <span class="hp-regen-value">1</span>
              <span class="regen-detail"
                >&nbsp; per 6s standing (per 3s sitting)</span
              >

              <span class="weight-group">
                Weight: <span class="weight-box">2030</span>
              </span>
            </div>
            <div class="regen-row">
              <span class="regen-label"
                >Natural <span class="sp-text">SP</span> Regen:</span
              >
              <span class="sp-regen-value">1</span>
              <span class="regen-detail"
                >&nbsp; per 8s standing (per 4s sitting)</span
              >
            </div>
          </div>
        </div>
      </div>
      <div class="middle-container">
        <!-- <div class="hero-selection">
          <img src="images/swordsman.png" alt="selection" />
        </div> -->
      </div>
      <div class="right-container"></div>
    </section>

    <section id="skillPage" class="page">
      <!-- SKILL CONTENT -->
      <div class="header">
        <div class="back-button"></div>
        <div class="text-area"></div>
        <div class="job-level-drowpDown"></div>
      </div>
      <div class="right-body-container">
        <div class="job-icons"></div>
        <div class="job-image-container"></div>
        <div class="skill-tree-container">
          <div class="skill-tree-title">Magician Skill Tree</div>
          <div class="skill-tree-icons"></div>
        </div>
      </div>
    </section>
  </body>
</html>
